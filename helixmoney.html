<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <style>
    @keyframes ballBounce {

      0%,
      100% {
        transform: translateY(0) scaleX(1) scaleY(1)
      }

      45% {
        transform: translateY(-18px) scaleX(1) scaleY(1)
      }

      50% {
        transform: translateY(-20px) scaleX(1) scaleY(1)
      }

      55% {
        transform: translateY(-18px) scaleX(1) scaleY(1)
      }

      90% {
        transform: translateY(0) scaleX(1.08) scaleY(0.93)
      }
    }

    .logo-wrap {
      display: flex;
      justify-content: center
    }

    .logo-img {
      height: clamp(48px, 12vw, 80px);
      display: block;
      animation: ballBounce 1s cubic-bezier(.33, 0, .66, 1) infinite;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, .2));
    }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      transition: background 1s ease;
      font-family: 'Nunito', Arial, sans-serif
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: filter 0.5s ease
    }

    canvas.demo {
      filter: blur(1.5px) brightness(1.1) saturate(0.35) opacity(0.6)
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 28px
    }

    #hud.hidden {
      display: none
    }

    #earn {
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 4px 18px rgba(0, 0, 0, .22);
      transition: transform .15s cubic-bezier(.34, 1.56, .64, 1)

    #earn.pop {

    }

    #earn-label {
      font-size: 12px;
      font-weight: 700;

      text-shadow: 0 2px 6px rgba(0, 0, 0, .15)
    }

    #cashout-btn {
      margin-top: 12px;
      padding: 8px 24px;
      border: none;
      border-radius: 40px;
      font: 900 12px 'Nunito', Arial, sans-serif;
      background: rgba(255, 255, 255, .92);
      color: #1a1000;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .18);

    }

    #cashout-btn:hover {

    }

    #cashout-btn:active {

    .coin-pop {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transform: translateX(-50%);
      animation: coinUp .8s ease-out forwards

    .coin-pop .coin-icon {
      width: 20px;

      border-radius: 50%;
      background: #2ecc71;

    .coin-pop .coin-val {

    @keyframes coinUp {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1)

      80% {
        opacity: 1;
        transform: translateX(-50%) translateY(-65px) scale(1.05)

      position: fixed;

      flex-direction: column;

    }

    #sov .logo {
      font-size: clamp(22px, 6vw, 30px);

    .card-lbl {

    .card-val {

    }

    .bet-ctrl {
      display: flex;

      gap: 6px
    }

    .bb {
      width: 26px;
      height: 26px;
      border-radius: 50%;

    .bb:hover {

    .bb:active {
      transform: scale(.82)

    .bet-v {

    .play-btn {
      width: min(300px, 88vw);
      padding: 15px 0;
      border: none;
      border-radius: 60px;
      font: 900 18px 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      color: #1a1000;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255, 165, 0, .35);
      transition: transform .12s cubic-bezier(.34, 1.56, .64, 1)

    #dov {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px)
    }

    #dov .d-title {

    #dov .d-info {

    #flash {
      position: fixed;
      inset: 0;

      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle, rgba(255, 50, 50, .5) 0%, transparent 68%);
      transition: opacity .5s
    }

    #gflash {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle, rgba(60, 255, 120, .28) 0%, transparent 68%);
      transition: opacity .35s
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const PI2 = Math.PI * 2;
    const DEG = Math.PI / 180;

    const PAL = [
      { p: 16739229, a: 16747720, b: 16727423, o: 12720219, top: '#FFE4EE', bot: '#FFB3CB', k: 4849696 },
      { p: 2541274, a: 5099745, b: 44225, o: 33679, top: '#E0F7FA', bot: '#B2EBF2', k: 15173 },
      { p: 10275941, a: 11457921, b: 8172354, o: 5606191, top: '#F1F8E9', bot: '#DCEDC8', k: 1793568 },
      { p: 11225020, a: 13538264, b: 9315498, o: 6953882, top: '#F3E5F5', bot: '#E1BEE7', k: 2949185 },
      { p: 16754470, a: 16758605, b: 16088064, o: 15094016, top: '#FFF8E1', bot: '#FFECB3', k: 4071424 },
      { p: 6056896, a: 7964363, b: 3754411, o: 2635155, top: '#E8EAF6', bot: '#C5CAE9', k: 856663 },
      { p: 16740419, a: 16747109, b: 16011550, o: 12531212, top: '#FBE9E7', bot: '#FFCCBC', k: 4065792 },
    ];

    const SR = 3, VL = 0.55, QSEG = 32;
    const ML = 4, SL = -2, QINIT = 25, TGEN = 20, ECULL = 30;
    const SPIRAL = 35 * DEG;
    const BALL_R = 0.4, BZ = 1.6;
    const TRAIL_N = 8, TR_MAX = 0.28, TR_MIN = 0.08, TO_MAX = 0.7, TO_MIN = 0.05;
    const BOUNCE_V = 8;
    const CAM_Z = 10, CAM_ABOVE = 6, CAM_LOOK = -4;
    const DRAG_S = 0.012;
    const HOLE_BIG = 39 * DEG, HOLE_SMALL = 22 * DEG;
    const KILL_LO = 0.16, KILL_HI = 0.8;
    const GRAV_LO = -36, GRAV_HI = -76;
    const LL = 10, EG_MAX = 6;
    const MULT_START = 0.01, MULT_STEP = 0.02;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function normA(a) { return ((a % PI2) + PI2) % PI2; }
    function inArc(angle, start, len) {
      const a = normA(angle), s = normA(start), e = s + len;
      return e <= PI2 ? a >= s && a <= e : a >= s || a <= e - PI2;
    }
    function rng(lo, hi) { return lo + Math.random() * (hi - lo); }
    function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }
    function $(id) { return document.getElementById(id); }

    function getDiff(brk) {
      const e = clamp(Math.floor(brk / LL) / EG_MAX, 0, 1);
      return { holeSize: lerp(HOLE_BIG, HOLE_SMALL, e), killerChance: lerp(KILL_LO, KILL_HI, e), gravity: lerp(GRAV_LO, GRAV_HI, e) };
    }

    let wallet = 100, bet = 0.5, bestMult = 0;
    let renderer, scene, cam;
    let hGrp, poleMesh, ballMesh, ballGroupRef;
    let trailMeshes = [];
    let bY = 0, bVY = 0, prevBY = 0, bRotX = 0;
    let hRot = 0;
    let broken = 0, passed = 0, streak = 0;
    let multiplier = 0;
    let floors = [], breaking = [];
    let fCount = 0, lowestY = 0;
    let state = 'menu';
    let palI = 0, pal = PAL[0];
    let camY = 0, lastT = 0;
    let curGrav = GRAV_LO;
    let drag = false, dragX = 0;

    function setBG(p) { document.body.style.background = `linear-gradient(180deg,${p.top} 0%,${p.bot} 100%)`; }

    function buildPole() {
      if (poleMesh) scene.remove(poleMesh);
      poleMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(1, 1, 5000, 12),
        new THREE.MeshStandardMaterial({ color: pal.o, roughness: 0.7, metalness: 0.1 })
      );
      poleMesh.position.y = -2490;
      scene.add(poleMesh);
    }

    function makeSideWall(theta, mat) {
      const wall = new THREE.Mesh(new THREE.PlaneGeometry(SR, VL), mat);
      wall.rotation.y = theta - Math.PI / 2;
      wall.position.set(Math.sin(theta) * SR / 2, 0, Math.cos(theta) * SR / 2);
      return wall;
    }

    function makeSegMesh(sa, al, col) {
      const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.45, metalness: 0.05, side: THREE.DoubleSide });
      const N = Math.max(4, Math.round(QSEG * al / PI2));
      const grp = new THREE.Group();
      grp.add(new THREE.Mesh(new THREE.CylinderGeometry(SR, SR, VL, N, 1, false, sa, al), mat));
      grp.add(makeSideWall(sa, mat));
      grp.add(makeSideWall(sa + al, mat));
      return { grp, mat };
    }

    function buildBall() {
      if (ballGroupRef) { scene.remove(ballGroupRef); }
      const g = new THREE.Group();
      scene.add(g);
      ballGroupRef = g;
      ballMesh = new THREE.Mesh(
        new THREE.SphereGeometry(BALL_R, 32, 32),
        new THREE.MeshStandardMaterial({ color: pal.b, metalness: 0.25, roughness: 0.35 })
      );
      ballMesh.position.set(0, 0, BZ);
      g.add(ballMesh);
      trailMeshes = [];
      for (let i = 0; i < TRAIL_N; i++) {
        const e = i / (TRAIL_N - 1);
        const tm = new THREE.Mesh(
          new THREE.SphereGeometry(lerp(TR_MAX, TR_MIN, e), 8, 8),
          new THREE.MeshStandardMaterial({ color: pal.b, transparent: true, opacity: lerp(TO_MAX, TO_MIN, e) })
        );
        tm.position.set(0, 0, BZ);
        tm.visible = false;
        g.add(tm);
        trailMeshes.push(tm);
      }
    }

    function updateBallPal() {
      if (ballMesh) ballMesh.material.color.setHex(pal.b);
      trailMeshes.forEach(t => t.material.color.setHex(pal.b));
      if (poleMesh) poleMesh.material.color.setHex(pal.o);
    }

    function makeFloor(y, idx) {
      const grp = new THREE.Group();
      hGrp.add(grp);
      grp.position.y = y;
      const sa0 = idx * SPIRAL;
      grp.rotation.y = sa0;

      const diff = getDiff(broken);
      const holeSize = idx === 0 ? diff.holeSize * 1.85 : diff.holeSize;
      const kc = idx === 0 ? 0 : diff.killerChance;
      const holeStart = Math.random() * PI2;
      const numSeg = Math.floor(rng(6, 9));
      const segArc = (PI2 - holeSize) / numSeg;

      const kills = Array.from({ length: numSeg }, () => Math.random() < kc);
      if (kills.every(Boolean)) kills[Math.floor(Math.random() * numSeg)] = false;

      const fp = PAL[Math.floor(broken / LL) % PAL.length];
      const segs = [];
      for (let i = 0; i < numSeg; i++) {
        const sa = normA(holeStart + holeSize + i * segArc);
        const al = segArc - 0.008;
        const isK = kills[i];
        const col = isK ? fp.k : (i % 2 === 0 ? fp.p : fp.a);
        const { grp: sg, mat } = makeSegMesh(sa, al, col);
        grp.add(sg);
        segs.push({ sg, mat, isK, sa, al });
      }
      return { grp, y, idx, spiralAngle: sa0, holeStart, holeSize, segs, broken: false, passed: false };
    }

    function ballAngleFor(floor) {
      return normA(-(hRot + floor.spiralAngle));
    }

    function getHit(floor, angle) {
      const a = normA(angle);
      if (inArc(a, floor.holeStart, floor.holeSize)) return null;
      for (const s of floor.segs) {
        if (inArc(a, s.sa, s.al + 0.025)) return s;
      }
      return null;
    }

    function doBreak(floor) {
      floor.broken = true;
      floor.segs.forEach(s => {
        const mid = s.sa + s.al / 2;
        s.vx = Math.sin(mid) * rng(2, 4.5);
        s.vz = Math.cos(mid) * rng(2, 4.5);
        s.vy = rng(0.5, 2);
        s.mat.transparent = true;
      });
      breaking.push({ grp: floor.grp, segs: floor.segs, t: 0.55 });
    }

    function tickBreaks(dt) {
      breaking = breaking.filter(b => {
        b.t -= dt;
        const prog = 1 - Math.max(0, b.t) / 0.55;
        b.segs.forEach(s => {
          s.sg.position.x += s.vx * dt;
          s.sg.position.z += s.vz * dt;
          s.sg.position.y += s.vy * dt;
          s.vy -= 9.8 * dt;
          s.mat.opacity = Math.max(0, 1 - prog * 1.5);
        });
        if (b.t <= 0) {
          if (b.grp.parent) b.grp.parent.remove(b.grp);
          b.segs.forEach(s => { s.sg.children.forEach(m => { if (m.geometry) m.geometry.dispose(); }); s.mat.dispose(); });
          return false;
        }
        return true;
      });
    }

    function genMore() {
      while (lowestY > bY - TGEN * ML) { lowestY -= ML; floors.push(makeFloor(lowestY, fCount++)); }
    }

    function cull() {
      const cut = bY + ECULL * ML;
      floors = floors.filter(f => {
        if (f.y > cut) {
          if (f.grp.parent) f.grp.parent.remove(f.grp);
          f.segs.forEach(s => { s.sg.children.forEach(m => { if (m.geometry) m.geometry.dispose(); }); s.mat.dispose(); });
          return false;
        }
        return true;
      });
    }

    function updateHUD() {
      const el = $('earn');
      const pot = +(bet * multiplier).toFixed(2);
      el.textContent = fmt(pot);
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
      $('hw').textContent = fmt(wallet);
      $('hb').textContent = 'Aposta: ' + fmt(bet);
    }

    function cashout(voluntary) {
      if (state !== 'playing') return;
      const rescued = +(bet * multiplier).toFixed(2);
      wallet = +(wallet + rescued).toFixed(2);
      if (multiplier > bestMult) bestMult = +multiplier.toFixed(2);
      state = 'dead';
      $('gflash').style.opacity = '0.7';
      setTimeout(() => $('gflash').style.opacity = '0', 400);
      showDeath(true, rescued);
    }

    function die() {
      state = 'dead';
      $('flash').style.opacity = '1';
      setTimeout(() => $('flash').style.opacity = '0', 500);
      audio.playGameOver();
      setTimeout(() => showDeath(false, 0), 600);
    }

    function showDeath(won, rescued) {
      if (won) {
        $('dt').textContent = 'Você Ganhou! 🎉';
        $('dt').style.color = '#69ff9a';
        $('dr').textContent = fmt(rescued) + ' resgatado';
        $('dr').style.color = '#69ff9a';
      } else {
        $('dt').textContent = 'Game Over';
        $('dt').style.color = '#ff6b6b';
        $('dr').textContent = 'Você perdeu ' + fmt(bet);
        $('dr').style.color = '#ff8a80';
      }
      $('di').textContent = 'Carteira: ' + fmt(wallet) + ' • Melhor: ' + bestMult.toFixed(2) + 'x';
      $('dov').style.display = 'flex';
    }

    function spawnCoinPop(val) {
      const cx = innerWidth / 2;
      const cy = innerHeight * 0.45;
      const ox = (Math.random() - 0.5) * 120;
      const oy = (Math.random() - 0.5) * 80;
      const el = document.createElement('div');
      el.className = 'coin-pop';
      el.innerHTML = `<div class="coin-icon">$</div><div class="coin-val">+${fmt(val)}</div>`;
      el.style.left = (cx + ox) + 'px';
      el.style.top = (cy + oy) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 850);
    }

    class Audio {
      constructor() { this.ctx = null; this._ready = false; }
      init() {
        const resume = () => {
          if (this._ready) return;
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this._ready = true;
        };
        document.addEventListener('click', resume, { once: true });
        document.addEventListener('touchstart', resume, { once: true, passive: true });
      }
      _osc(type, freq, gain, dur, delay = 0) {
        if (!this._ready) return;
        const t = this.ctx.currentTime + delay;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.type = type; o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(gain, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.start(t); o.stop(t + dur);
      }
      playBounce() {
        if (!this._ready) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(300, t);
        o.frequency.exponentialRampToValueAtTime(150, t + 0.15);
        g.gain.setValueAtTime(0.15, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        o.start(t); o.stop(t + 0.15);
      }
      playCoin() {
        if (!this._ready) return;
        [{ freq: 988, start: 0, dur: .12 }, { freq: 1319, start: .07, dur: .2 }].forEach(({ freq, start, dur }) => {
          this._osc('sine', freq, 0.16, dur, start);
        });
      }
      playBreak() {
        if (!this._ready || !this.ctx) return;
        const buf = this.ctx.createBuffer(1, 4096, this.ctx.sampleRate);
        const d = buf.getChannelData(0); for (let i = 0; i < 4096; i++)d[i] = Math.random() * 2 - 1;
        const src = this.ctx.createBufferSource(), g = this.ctx.createGain();
        src.buffer = buf; src.connect(g); g.connect(this.ctx.destination);
        g.gain.setValueAtTime(0.2, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
        src.start(); src.stop(this.ctx.currentTime + 0.08);
      }
      playCombo(count) {
        if (!this._ready) return;
        const freq = 400 + (count - 1) * 80;
        const dur = 0.15 + (count - 1) * 0.05;
        this._osc('sine', freq, 0.12, dur);
      }
      playPhaseChange() {
        if (!this._ready) return;
        const t = this.ctx.currentTime;
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = this.ctx.createOscillator(), g = this.ctx.createGain();
          o.connect(g); g.connect(this.ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(f, t + i * 0.09);
          g.gain.setValueAtTime(0.1, t + i * 0.09);
          g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.18);
          o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.18);
        });
      }
      playStreak(count) {
        if (!this._ready) return;
        const t = this.ctx.currentTime;
        const notes = [523, 659, 784, 880, 1047, 1175, 1319];
        const n = Math.min(count, notes.length);
        for (let i = 0; i < n; i++) {
          const o = this.ctx.createOscillator(), g = this.ctx.createGain();
          o.connect(g); g.connect(this.ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(notes[i], t + i * 0.07);
          g.gain.setValueAtTime(0.13, t + i * 0.07);
          g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.14);
          o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.14);
        }
      }
      playGameOver() { [400, 320, 240].forEach((f, i) => this._osc('sine', f, 0.15, 0.1, i * 0.12)); }
    }
    const audio = new Audio();

    const CLOUD_STYLES = [
      { color: 0xcccccc, clusters: [[0, 0, 0, 1.4], [1.2, 0.1, 0, 1.1], [-1.1, 0, 0.2, 1.0], [0.4, 0.6, 0, 0.9], [-0.5, 0.5, 0.3, 0.85]] },
      { color: 0xb2d8e8, clusters: [[0, 0, 0, 1.6], [1.5, 0.2, 0, 1.0], [-1.3, 0.1, 0.1, 0.9], [0.6, 0.8, 0, 0.8], [1.8, 0.5, 0, 0.7]] },
      { color: 0xc8e6c9, clusters: [[0, 0, 0, 1.3], [-1.0, 0.3, 0, 1.1], [1.0, 0.2, 0.2, 1.0], [-0.4, 0.8, 0, 0.85], [0.5, 0.7, 0.3, 0.75]] },
      { color: 0xd7b8e0, clusters: [[0, 0, 0, 1.5], [1.3, 0, 0.1, 1.2], [-1.2, 0.2, 0, 0.95], [0.3, 0.9, 0, 0.85], [-0.6, 0.6, 0.3, 0.7], [1.0, 0.9, 0, 0.65]] },
      { color: 0xffe9a0, clusters: [[0, 0, 0, 1.4], [1.1, 0.1, 0, 1.0], [1.8, 0.3, 0, 0.75], [-1.0, 0.2, 0.1, 0.9], [0.4, 0.7, 0, 0.8]] },
      { color: 0xc5cae9, clusters: [[0, 0, 0, 1.6], [-1.4, 0.1, 0, 1.1], [1.3, 0.2, 0.1, 1.0], [-0.5, 0.9, 0, 0.85], [0.6, 0.8, 0.2, 0.75], [-1.8, 0.6, 0, 0.65]] },
      { color: 0xffccbc, clusters: [[0, 0, 0, 1.3], [1.0, 0.2, 0, 1.1], [-1.1, 0.1, 0.1, 0.95], [0.4, 0.7, 0, 0.85], [-0.5, 0.6, 0.2, 0.7]] },
    ];

    let cloudGroups = [];

    function spawnPhaseCloud(phase) {
      const style = CLOUD_STYLES[phase % CLOUD_STYLES.length];
      const side = Math.random() < 0.5 ? -1 : 1;
      const xBase = (9 + Math.random() * 5) * side;
      const yStart = bY - 20 - Math.random() * 6;
      const yTarget = bY - 5 - Math.random() * 8;
      const z = -3 - Math.random() * 3;
      const g = new THREE.Group();
      const mats = [];
      style.clusters.forEach(([cx, cy, cz, r]) => {
        const mat = new THREE.MeshStandardMaterial({ color: style.color, roughness: 1, metalness: 0, transparent: true, opacity: 0 });
        const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
        m.position.set(cx, cy, cz); g.add(m); mats.push(mat);
      });
      g.position.set(xBase, yStart, z);
      scene.add(g);
      cloudGroups.push({ grp: g, mats, opacity: 0, targetOpacity: 0.5, speed: 0.005, yTarget, rising: true });
    }

    function buildClouds() {
      cloudGroups = [];
      const style = CLOUD_STYLES[0];
      const positions = [
        [-12, 4, -6], [12, 3, -5], [-10, -3, -4], [11, -5, -3],
        [-13, -12, -5], [12, -14, -4], [-10, -22, -3], [11, -28, -4],
      ];
      positions.forEach(([x, y, z]) => {
        const g = new THREE.Group();
        const mats = [];
        style.clusters.forEach(([cx, cy, cz, r]) => {
          const mat = new THREE.MeshStandardMaterial({ color: style.color, roughness: 1, metalness: 0, transparent: true, opacity: 0.5 });
          const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
          m.position.set(cx, cy, cz); g.add(m); mats.push(mat);
        });
        g.position.set(x, y, z);
        scene.add(g);
        cloudGroups.push({ grp: g, mats, opacity: 0.5, targetOpacity: 0.5, speed: 0, rising: false });
      });
    }

    function tickClouds() {
      cloudGroups.forEach(c => {
        if (c.opacity < c.targetOpacity) {
          c.opacity = Math.min(c.opacity + c.speed, c.targetOpacity);
          c.mats.forEach(m => m.opacity = c.opacity);
        }
        if (c.rising && c.grp.position.y < c.yTarget) {
          c.grp.position.y += 0.03;
        }
      });
    }

    function initStatic() {
      floors.forEach(f => { if (f.grp.parent) f.grp.parent.remove(f.grp); });
      floors = []; breaking = [];
      fCount = 0; lowestY = 0;
      bY = 1.5; bVY = 0; prevBY = bY; bRotX = 0;
      hRot = 0; hGrp.rotation.y = 0;
      broken = 0; passed = 0; streak = 0; multiplier = 0;
      palI = 0; pal = PAL[0];
      setBG(pal); updateBallPal(); buildPole();
      for (let i = 0; i < QINIT; i++) { const y = SL - i * ML; floors.push(makeFloor(y, fCount++)); if (y < lowestY) lowestY = y; }
      ballMesh.position.set(0, bY, BZ);
      hGrp.rotation.y = 0.5;
      cam.position.set(0, bY + 3, 14);
      cam.lookAt(0, bY - 8, 0);
      $('c').classList.add('demo');
      $('hud').classList.add('hidden');
      $('hud-info').style.display = 'none';
      renderer.render(scene, cam);
    }

    function startRound() {
      if (wallet < bet) return;
      wallet = +(wallet - bet).toFixed(2);
      floors.forEach(f => { if (f.grp.parent) f.grp.parent.remove(f.grp); });
      breaking.forEach(b => { if (b.grp.parent) b.grp.parent.remove(b.grp); });
      floors = []; breaking = [];
      fCount = 0; lowestY = 0;
      bY = 1.5; bVY = 0; prevBY = bY; bRotX = 0;
      hRot = 0; hGrp.rotation.y = 0;
      broken = 0; passed = 0; streak = 0; multiplier = 0;
      palI = 0; pal = PAL[0];
      curGrav = GRAV_LO;
      cloudGroups.forEach(c => { if (c.grp.parent) c.grp.parent.remove(c.grp); });
      buildClouds();
      setBG(pal); updateBallPal(); buildPole();
      for (let i = 0; i < QINIT; i++) { const y = SL - i * ML; floors.push(makeFloor(y, fCount++)); if (y < lowestY) lowestY = y; }
      camY = bY + CAM_ABOVE;
      $('earn').textContent = 'R$ 0,00';
      $('earn').classList.remove('pop');
      $('flash').style.opacity = '0';
      $('gflash').style.opacity = '0';
      updateHUD();
    }

    function update(dt) {
      curGrav = getDiff(broken).gravity;
      prevBY = bY;
      bVY += curGrav * dt;
      if (bVY < -40) bVY = -40;
      bY += bVY * dt;
      bRotX += bVY * dt * 0.5;
      ballMesh.position.set(0, bY, BZ);
      ballMesh.rotation.set(bRotX, 0, ballMesh.rotation.z + 0.022);

      const falling = bVY < -1.5;
      for (let i = trailMeshes.length - 1; i >= 0; i--) {
        trailMeshes[i].position.set(0, i === 0 ? prevBY : trailMeshes[i - 1].position.y, BZ);
        trailMeshes[i].visible = falling;
      }

      hGrp.rotation.y = hRot;

      if (bVY < 0) {
        for (const f of floors) {
          if (f.broken || f.passed) continue;
          const top = f.y + VL / 2;
          if (prevBY < top || bY > top) continue;
          const angle = ballAngleFor(f);
          const hit = getHit(f, angle);
          if (hit === null) {
            f.passed = true;
            doBreak(f);
            broken++; passed++; streak++;
            multiplier = +((MULT_START + (passed - 1) * MULT_STEP)).toFixed(2);
            const np = Math.floor(broken / LL) % PAL.length;
            if (np !== palI) { palI = np; pal = PAL[palI]; setBG(pal); updateBallPal(); audio.playPhaseChange(); spawnPhaseCloud(np); spawnPhaseCloud(np); }
            $('gflash').style.opacity = '0.7';
            setTimeout(() => $('gflash').style.opacity = '0', 280);
            audio.playBreak();
            if (streak >= 3) { audio.playStreak(streak); }
            else { audio.playCoin(); }
            if (streak >= 2) { audio.playCombo(streak); }
            spawnCoinPop(+(bet * multiplier).toFixed(2));
            updateHUD();
          } else if (hit.isK) {
            die(); return;
          } else {
            bY = top; bVY = BOUNCE_V;
            streak = 0;
            audio.playBounce();
          }
        }
      }
      genMore(); cull(); tickBreaks(dt); tickClouds();
    }

    function loop(t) {
      requestAnimationFrame(loop);
      const dt = Math.min((t - lastT) / 1000, 0.05);
      lastT = t;
      if (state === 'playing') {
        update(dt);
      }
      const tc = bY + CAM_ABOVE;
      camY += (tc - camY) * Math.min(dt * 9, 1);
      cam.position.set(0, camY, CAM_Z);
      cam.lookAt(0, bY + CAM_LOOK, 0);
      renderer.render(scene, cam);
    }

    function init() {
      const cv = $('c');
      renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
      renderer.setClearColor(0, 0);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xD0E8FF, 25, 80);
      cam = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 1000);
      cam.position.set(0, 8, CAM_Z);
      scene.add(new THREE.AmbientLight(0xffffff, 0.9));
      const dl = new THREE.DirectionalLight(0xffffff, 0.5);
      dl.position.set(5, 15, 8); scene.add(dl);
      hGrp = new THREE.Group(); scene.add(hGrp);
      buildPole(); buildBall(); buildClouds(); setBG(pal);

      window.addEventListener('resize', () => {
        renderer.setSize(innerWidth, innerHeight);
        cam.aspect = innerWidth / innerHeight;
        cam.updateProjectionMatrix();
      });

      cv.addEventListener('mousedown', e => { drag = true; dragX = e.clientX; });
      window.addEventListener('mousemove', e => { if (!drag) return; hRot += (e.clientX - dragX) * DRAG_S; dragX = e.clientX; });
      window.addEventListener('mouseup', () => drag = false);
      cv.addEventListener('touchstart', e => { drag = true; dragX = e.touches[0].clientX; e.preventDefault(); }, { passive: false });
      window.addEventListener('touchmove', e => { if (!drag) return; hRot += (e.touches[0].clientX - dragX) * DRAG_S; dragX = e.touches[0].clientX; }, { passive: false });
      window.addEventListener('touchend', () => drag = false);

      audio.init();
      $('cashout-btn').addEventListener('click', () => { cashout(true); });
      $('bUp').addEventListener('click', () => { if (bet + 0.5 <= wallet) bet = +(bet + 0.5).toFixed(2); $('wdisp').textContent = fmt(wallet); $('bdisp').textContent = fmt(bet); });

      $('sBtn').addEventListener('click', () => {
        if (wallet < bet) return;
        $('sov').style.display = 'none';
        $('c').classList.remove('demo');
        $('hud').classList.remove('hidden');
        $('hud-info').style.display = 'block';
        state = 'playing'; startRound();
      });
      $('rBtn').addEventListener('click', () => {
        if (wallet <= 0) { wallet = 100; }
        if (wallet < bet) bet = 0.5;
        $('dov').style.display = 'none';
        $('wdisp').textContent = fmt(wallet);
        $('bdisp').textContent = fmt(bet);
        $('sov').style.display = 'flex';
        state = 'idle';
        initStatic();
      });

      lastT = performance.now();
      state = 'idle';
      initStatic();
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
